name: gold_invest
description: "Local gold investment plan app — monthly cash savings toward a gold coin, with user and admin roles, backed by Firebase."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  cloud_functions: ^5.1.3
  firebase_messaging: ^15.1.3
  firebase_analytics: ^11.3.3
  firebase_crashlytics: ^4.1.3
  firebase_app_check: ^0.3.1+3
  firebase_storage: ^12.3.3

  # State management, DI & routing
  get: ^4.6.6
  get_storage: ^2.1.1

  # Auth providers
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.4

  # UI helpers
  cached_network_image: ^3.4.1

  # Formatting (dates / currency)
  intl: ^0.19.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/lang/
    - assets/config/
    - assets/images/
    - assets/icons/
    - assets/animations/
