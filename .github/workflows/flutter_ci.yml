name: Flutter CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze lib/ test/

      - name: Run tests
        run: flutter test

  build_android:
    name: Build Android (dev)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (dev flavor)
        run: flutter build apk --release --target lib/main_dev.dart

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_CREDENTIALS }}
          groups: testers
          file: build/app/outputs/flutter-apk/app-release.apk
          releaseNotes: "Build from ${{ github.ref_name }} — ${{ github.sha }}"

  build_ios:
    name: Build iOS (dev)
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign --target lib/main_dev.dart

      # Full IPA upload to Firebase App Distribution requires provisioning profiles.
      # Configure secrets FIREBASE_IOS_APP_ID, FIREBASE_SERVICE_CREDENTIALS,
      # APPLE_CERTIFICATE_BASE64, APPLE_PROVISIONING_PROFILE_BASE64 for signed builds.
